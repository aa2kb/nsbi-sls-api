service: nsbi-sls-api

useDotenv: true

plugins:
  - serverless-offline
  - serverless-prune-plugin

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${self:custom.stage}
  region: us-east-1
  profile: nsbi
  memorySize: 1024
  logRetentionInDays: 7
  apiGateway:
    apiKeys:
      - name: nsbi-api-key-${self:custom.stage}
        description: API key for NSBI API ${self:custom.stage} environment
    usagePlan:
      throttle:
        burstLimit: 200
        rateLimit: 100
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:*
          Resource:
            - arn:aws:s3:::*
            - arn:aws:s3:::*/*
        - Effect: Allow
          Action:
            - bedrock:*
          Resource:
            - "*"
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            - "*"
  environment:
    STAGE: ${self:custom.stage}
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT}
    DB_NAME: ${env:DB_NAME}
    DB_USERNAME: ${env:DB_USERNAME}
    DB_PASSWORD: ${env:DB_PASSWORD}
    FIREFLIES_API_KEY: ${env:FIREFLIES_API_KEY}
    MEETINGS_BUCKET: ${env:MEETINGS_BUCKET}
    PIPELINE_TOPIC_ARN: arn:aws:sns:${aws:region}:${aws:accountId}:nsbi-meeting-pipeline-${self:custom.stage}

functions:
  helloWorld:
    handler: src/lambda/hello/hello.handler
    timeout: 30
    events:
      - http:
          path: /hello
          method: get
          private: true

  listUsers:
    handler: src/lambda/users/list-users.handler
    timeout: 30
    events:
      - http:
          path: /users
          method: get
          private: true

  createUser:
    handler: src/lambda/users/create-user.handler
    timeout: 30
    events:
      - http:
          path: /users
          method: post
          private: true

  listTasks:
    handler: src/lambda/tasks/list-tasks.handler
    timeout: 30
    events:
      - http:
          path: /tasks
          method: get
          private: true

  listMeetings:
    handler: src/lambda/meetings/list-meetings.handler
    timeout: 30
    events:
      - http:
          path: /meetings
          method: get
          private: true

  fetchMeetings:
    handler: src/lambda/meetings/fetch-meetings.handler
    timeout: 30
    events:
      - http:
          path: /meetings/fetch
          method: get
          private: true
      - schedule:
          rate: rate(1 day)
          enabled: true
          description: Daily sync of meetings from Fireflies

  processParticipants:
    handler: src/lambda/meetings/process-participants.handler
    timeout: 30
    events:
      - http:
          path: /meetings/{id}/process-participants
          method: get
          private: true

  processData:
    handler: src/lambda/meetings/process-data.handler
    timeout: 300
    events:
      - http:
          path: /meetings/{id}/process-data
          method: get
          private: true

  processTasks:
    handler: src/lambda/meetings/process-tasks.handler
    timeout: 300
    events:
      - http:
          path: /meetings/{id}/process-tasks
          method: post
          private: true

  processUsers:
    handler: src/lambda/meetings/process-users.handler
    timeout: 300
    events:
      - http:
          path: /meetings/{id}/process-users
          method: post
          private: true

  processPipeline:
    handler: src/lambda/meetings/process-pipeline.handler
    timeout: 900
    events:
      - sns:
          topicName: nsbi-meeting-pipeline-${self:custom.stage}
      - http:
          path: /meetings/{id}/process-pipeline
          method: post
          private: true

custom:
  stage: ${opt:stage, 'dev'}
  allowedStages:
    - dev
    - prod

  # Prune old Lambda versions - keep only 1 version
  prune:
    automatic: true
    number: 1

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node22
    platform: node
    format: esm
    banner:
      js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
